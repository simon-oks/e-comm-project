services:
  node_exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter
    ports:
      - "9100:9100"
    restart: always
    networks:
      - our_network

  prometheus:
    image: prom/prometheus:latest
    extra_hosts:
      - "host.docker.internal:host-gateway"
    container_name: prometheus
    ports:
      - "9095:9090"
    volumes:
      - ./monitoring/prometheus_data:/prometheus
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: always
    networks:
      - our_network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana_data:/var/lib/grafana
    restart: always
    networks:
      - our_network

  # Services Infrastructures

  eureka-server-service:
    build: ./eureka-server-service
    container_name: eureka-server-service
    ports:
      - "8761:8761"
    expose:
      - "8761"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      retries: 4

  config-service:
    build: ./config-service
    container_name: config-service
    ports:
      - "8888:8888"
    expose:
      - "8888"
    volumes:
      - /home/oks/e-comm-project-ms-config-repo:/config-repo
    environment:
      - DISCOVERY_SERVICE_URL=http://eureka-server-service:8761/eureka
      - CONFIG_FOLDER_URI=file:///config-repo
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 10s
      retries: 4
    depends_on:
      eureka-server-service:
        condition: service_healthy

  gateway-service:
    build: ./getway-service
    container_name: gateway-service
    ports:
      - "8000:8000"
    expose:
      - "8000"
    environment:
      - DISCOVERY_SERVICE_URL=http://eureka-server-service:8761/eureka
      - CONFIG_SERVICE_URL=http://config-service:8888
    depends_on:
      config-service:
        condition: service_healthy

  # Services metiers

  product-service:
    build: ./product-service
    container_name: product-service
    ports:
      - "8081:8081"
    expose:
      - "8081"
    environment:
      - DISCOVERY_SERVICE_URL=http://eureka-server-service:8761/eureka
      - CONFIG_SERVICE_URL=http://config-service:8888
    depends_on:
      config-service:
        condition: service_healthy

  customer-service:
    build: ./customer-service
    container_name: customer-service
    ports:
      - "8082:8082"
    expose:
      - "8082"
    environment:
      - DISCOVERY_SERVICE_URL=http://eureka-server-service:8761/eureka
      - CONFIG_SERVICE_URL=http://config-service:8888
    depends_on:
      config-service:
        condition: service_healthy

  cart-service:
    build: ./cart-service
    container_name: cart-service
    ports:
      - "8083:8083"
    expose:
      - "8083"
    environment:
      - DISCOVERY_SERVICE_URL=http://eureka-server-service:8761/eureka
      - CONFIG_SERVICE_URL=http://config-service:8888
    depends_on:
      config-service:
        condition: service_healthy

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8084:8084"
    expose:
      - "8084"
    environment:
      - DISCOVERY_SERVICE_URL=http://eureka-server-service:8761/eureka
      - CONFIG_SERVICE_URL=http://config-service:8888
    depends_on:
      config-service:
        condition: service_healthy


#volumes:
