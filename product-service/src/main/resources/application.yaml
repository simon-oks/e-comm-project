server:
  port: 8081
spring:
  application:
    name: product-service
  datasource:
    url: jdbc:h2:file:./data/product-service-db
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

