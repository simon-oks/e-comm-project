spring:
  application:
    name: file-service
  config:
    import: optional:configserver:http://localhost:8888
  datasource:
    url: jdbc:h2:file:./data/file-service-db
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8085

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# Stockage local
file:
  storage:
    upload-dir: ./uploads
    max-file-size: 10MB   # taille max par fichier
    allowed-types:        # types MIME autoris�s
      - image/jpeg
      - image/jpg
      - image/png
      - application/pdf
      - text/plain